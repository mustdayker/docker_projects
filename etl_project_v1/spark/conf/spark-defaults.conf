# Основные настройки кластера
spark.master                     spark://spark-master:7077


# Event Logging
spark.eventLog.enabled           false


# Hive
spark.sql.catalogImplementation  hive

# Ресурсы под 2 воркера × 10 ядер, 18g RAM
# spark.executor.instances         2
# spark.executor.cores             10
# spark.executor.memory            16g
# spark.driver.memory              4g
# spark.cores.max                  20

# Ресурсы под 2 воркера × 10 ядер, 18g RAM
spark.executor.instances         2
spark.executor.cores             5
spark.executor.memory            8g
spark.driver.memory              4g
spark.cores.max                  10




# MinIO конфигурация
spark.hadoop.fs.s3a.access.key             minioadmin
spark.hadoop.fs.s3a.secret.key             minioadmin
spark.hadoop.fs.s3a.endpoint               http://minio:9000
spark.hadoop.fs.s3a.path.style.access      true
spark.hadoop.fs.s3a.impl                   org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled false


# Дополнительные оптимизации
spark.sql.adaptive.enabled                    true
spark.sql.adaptive.coalescePartitions.enabled true
spark.serializer                              org.apache.spark.serializer.KryoSerializer

# Iceberg конфигурация
spark.sql.extensions                           org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.iceberg                      org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.iceberg.type                 hadoop
spark.sql.catalog.iceberg.warehouse            s3a://iceberg-warehouse/
spark.sql.catalog.iceberg.io-impl              org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.iceberg.hadoop.fs.s3a.endpoint http://minio:9000
spark.sql.catalog.iceberg.hadoop.fs.s3a.access.key minioadmin
spark.sql.catalog.iceberg.hadoop.fs.s3a.secret.key minioadmin
spark.sql.catalog.iceberg.hadoop.fs.s3a.path.style.access true
spark.sql.catalog.iceberg.hadoop.fs.s3a.impl   org.apache.hadoop.fs.s3a.S3AFileSystem

# spark.sql.catalog.iceberg — создаем каталог с именем iceberg
# .type = hadoop — используем HadoopCatalog
# .warehouse = s3a://iceberg-warehouse/ — все таблицы будут в бакете iceberg-warehouse
# .io-impl — специальный IO-класс для S3 (оптимизирован для Iceberg)

